name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cloud_phone_rental?schema=public
      AUTH_SECRET: github-ci-auth-secret-change-in-production
      SETTINGS_SECRET: github-ci-settings-secret-change-in-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit --pretty false

      - name: Build
        run: npm run build
